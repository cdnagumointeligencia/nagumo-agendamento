<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo · Agendamento de Fornecedores</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --cyan: #3AC4D4; --navy: #031F3E; --navy2: #062952; --red: #CD0036; --red-dk: #a8002b;
  --gray-bg: #F0F2F6; --gray-border: #E4E8EF; --white: #ffffff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--gray-bg);color:var(--navy);overflow-x:hidden;}

/* TOPBAR PREMIUM */
.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, #0a3d6e 100%);
  height: 64px; display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 100; color: white; border-bottom: 1px solid rgba(58,196,212,0.12);
}
.logo-mark {
  width: 38px; height: 38px; background: linear-gradient(135deg, var(--red) 0%, var(--red-dk) 100%);
  border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px;
}
.cd-selector {
  display: flex; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12);
}
.cd-option {
  padding: 6px 16px; border: none; background: none; color: rgba(255,255,255,0.4);
  font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 8px; transition: 0.2s;
}
.cd-option.active { background: var(--cyan); color: var(--navy); }

/* HERO & STATS */
.hero { background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%); padding: 35px 32px; color: white; }
.stat-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); background: white; border-bottom: 1px solid var(--gray-border); }
.stat-card { padding: 18px 24px; border-right: 1px solid var(--gray-border); }
.stat-val { font-size: 28px; font-weight: 800; line-height: 1; margin: 4px 0; }

/* TABLE & UI */
.content-area { padding: 24px; max-width: 1400px; margin: 0 auto; }
.toolbar { background: white; padding: 16px 24px; border-radius: 20px 20px 0 0; display: flex; align-items: center; gap: 12px; border: 1px solid var(--gray-border); }
.table-wrap { background: white; border: 1px solid var(--gray-border); border-top: none; border-radius: 0 0 20px 20px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 20px; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; background: #f8fafc; }
td { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.btn-primary { background: linear-gradient(135deg, var(--red), var(--red-dk)); color: white; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }

/* VIEW TOGGLE */
.view { display: none; } .view.active { display: block; }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-mark">N</div>
  <div style="line-height: 1.1">
    <div class="logo-name">NAGUMO</div>
    <div class="logo-sub">Agendamento</div>
  </div>

  <div class="cd-selector">
    <button class="cd-option active" id="btn-CD1" onclick="setCD('CD1')">CD1</button>
    <button class="cd-option" id="btn-CD2" onclick="setCD('CD2')">CD2</button>
  </div>

  <div class="topbar-right">
    <button onclick="setView('agenda')" class="nav-pill active" id="nav-agenda">AGENDA</button>
    <button onclick="setView('dash')" class="nav-pill" id="nav-dash">DASHBOARD</button>
    <button onclick="logout()" style="background:none; border:none; color:white; font-weight:700; font-size:11px; cursor:pointer; opacity:0.6; margin-left:10px">SAIR</button>
  </div>
</header>

<main>
  <div id="view-agenda" class="view active">
    <section class="hero">
      <h1 class="hero-title">Gestão de <span id="hero-cd-label">CD1</span></h1>
      <p class="hero-sub">Painel de monitoramento de recebimento de fornecedores para a unidade <b id="sub-cd-label">CD1</b></p>
    </section>

    <div class="stat-bar" id="stat-bar"></div>

    <div class="content-area">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Buscar razão social..." style="flex:1; padding:10px 15px; border-radius:12px; border:1px solid var(--gray-border); outline:none" oninput="renderTable()">
        <button class="btn-primary" onclick="openModal()">NOVO REGISTRO</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Data</th><th>Fornecedor</th><th>Contrato</th><th>Carga</th><th>Volumes</th><th>Status</th></tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="view-dash" class="view" style="padding:40px">
    <h2>Estatísticas Unidade <span id="dash-cd-label">CD1</span></h2>
    <div style="background:white; padding:30px; border-radius:24px; margin-top:20px; border:1px solid var(--gray-border)">
      <canvas id="chart-main" height="100"></canvas>
    </div>
  </div>
</main>

<script>
// CONFIG FIREBASE
const _fbConfig = {
  apiKey: "AIzaSyCkUu4CRWEs4HuaYXMKAHQaMQPeQ6BHiKQ",
  authDomain: "nagumo-agendamento.firebaseapp.com",
  projectId: "nagumo-agendamento",
  storageBucket: "nagumo-agendamento.firebasestorage.app",
  messagingSenderId: "577346122276",
  appId: "1:577346122276:web:e00efca664c8d438119eb1"
};
firebase.initializeApp(_fbConfig);
const _db = firebase.firestore();

let registries = [];
let selectedCD = localStorage.getItem('nag_selected_cd') || 'CD1';

// SELETOR DE CD
async function setCD(cd) {
  selectedCD = cd;
  localStorage.setItem('nag_selected_cd', cd);
  updateCDUI();
  renderAll();
}

function updateCDUI() {
  document.getElementById('btn-CD1').classList.toggle('active', selectedCD === 'CD1');
  document.getElementById('btn-CD2').classList.toggle('active', selectedCD === 'CD2');
  document.getElementById('hero-cd-label').textContent = selectedCD;
  document.getElementById('sub-cd-label').textContent = selectedCD;
  document.getElementById('dash-cd-label').textContent = selectedCD;
}

// LOGICA DE DADOS
async function loadData() {
  const snap = await _db.collection('nagumo_agenda').doc('nag_reg').get();
  if(snap.exists) registries = snap.data().payload || [];
  renderAll();
}

function renderAll() {
  renderTable();
  renderStats();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = registries.filter(r => (r.cd || 'CD1') === selectedCD && r.razaoSocial.toLowerCase().includes(q));
  
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td style="color:#94a3b8; font-weight:700">${r.data.split('-').reverse().slice(0,2).join('/')}</td>
      <td><div style="font-weight:800">${r.razaoSocial}</div><div style="font-size:10px; color:#94a3b8">${r.categoria}</div></td>
      <td><span class="badge" style="background:#eff6ff; color:#1d4ed8">${r.tipoContrato}</span></td>
      <td>${r.tipoCarga}</td>
      <td style="font-weight:800">${r.volumes || 0}</td>
      <td>${r.volConf ? '<b style="color:#16a34a">✓ Conf.</b>' : '<span style="opacity:0.4">Pend.</span>'}</td>
    </tr>
  `).join('');
}

function renderStats() {
  const filtered = registries.filter(r => (r.cd || 'CD1') === selectedCD);
  const totalVol = filtered.reduce((s,r) => s + (parseInt(r.volumes) || 0), 0);
  const bar = document.getElementById('stat-bar');
  bar.innerHTML = `
    <div class="stat-card"><div class="stat-label">Fornecedores</div><div class="stat-val">${filtered.length}</div></div>
    <div class="stat-card"><div class="stat-label">Volume Total</div><div class="stat-val" style="color:var(--cyan)">${totalVol}</div></div>
    <div class="stat-card"><div class="stat-label">Confirmados</div><div class="stat-val" style="color:#16a34a">${filtered.filter(x=>x.volConf).length}</div></div>
  `;
}

function setView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
}

function logout() { sessionStorage.removeItem('nagumo_auth'); window.location.href = 'login.html'; }

// BOOT
(function boot() {
  if(!sessionStorage.getItem('nagumo_auth')) window.location.href = 'login.html';
  updateCDUI();
  loadData();
})();
</script>
</body>
</html>
