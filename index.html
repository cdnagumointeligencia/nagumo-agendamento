<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo · Agendamento de Fornecedores</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --cyan:        #3AC4D4;
  --cyan-dk:     #28a0b0;
  --navy:        #031F3E;
  --navy2:       #062952;
  --navy-mid:    #0a3d6e;
  --red:         #CD0036;
  --red-dk:      #a8002b;
  --gray-bg:     #F0F2F6;
  --gray-border: #E4E8EF;
  --white:       #ffffff;
  --font:        'Plus Jakarta Sans', sans-serif;
  --radius-xl:   24px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-bg);color:var(--navy);font-size:14px;min-height:100vh;}

/* ── TOPBAR ── */
.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, var(--navy-mid) 100%);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  color: white;
  box-shadow: 0 4px 20px rgba(3,31,62,0.3);
}

.logo-mark {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dk) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 18px;
  box-shadow: 0 4px 12px rgba(205,0,54,0.4);
}

.logo-name { font-weight: 800; font-size: 14px; letter-spacing: 1px; }
.logo-sub { font-size: 8px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; }

/* ── CD SELECTOR ── */
.cd-toggle-group {
  display: flex;
  background: rgba(255,255,255,0.05);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  margin: 0 16px;
}
.cd-btn {
  padding: 6px 16px;
  border: none;
  background: none;
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
}
.cd-btn.active {
  background: var(--cyan);
  color: var(--navy);
  box-shadow: 0 2px 8px rgba(58,196,212,0.4);
}

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

/* ── NAV PILLS ── */
.nav-pill {
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-pill.active { background: var(--red); color: white; }
.nav-pill:not(.active) { color: rgba(255,255,255,0.6); }
.nav-pill:not(.active):hover { background: rgba(255,255,255,0.1); color: white; }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 40px 32px;
  color: white;
  position: relative;
  overflow: hidden;
}
.hero-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.hero-title span { color: var(--cyan); }
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.5); }

/* ── STATS ── */
.stat-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  background: white;
  border-bottom: 1px solid var(--gray-border);
}
.stat-card {
  padding: 20px 24px;
  border-right: 1px solid var(--gray-border);
  cursor: pointer;
  transition: background 0.2s;
}
.stat-card:hover { background: #f8fafc; }
.stat-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 16px 24px;
  background: white;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--gray-border);
}
.search-box {
  flex: 1;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 16px;
  background: #f1f5f9;
  border: 1px solid transparent;
  border-radius: 12px;
  outline: none;
  font-family: inherit;
  font-size: 13px;
  transition: all 0.2s;
}
.search-box input:focus { background: white; border-color: var(--cyan); box-shadow: 0 0 0 4px rgba(58,196,212,0.1); }

.btn-add {
  background: linear-gradient(135deg, var(--red), var(--red-dk));
  color: white;
  padding: 10px 24px;
  border-radius: 12px;
  border: none;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(205,0,54,0.3);
  transition: transform 0.2s;
}
.btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(205,0,54,0.4); }

/* ── TABLE ── */
.table-container { background: white; width: 100%; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th { text-align: left; padding: 12px 24px; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid var(--gray-border); }
td { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
tr:hover { background: #f8fafc; }

.badge {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
}
.badge-cl { background: #eff6ff; color: #1d4ed8; }
.badge-scl { background: #fff7ed; color: #c2410c; }
.badge-ap { background: #f0fdf4; color: #15803d; }
.badge-co { background: #faf5ff; color: #7e22ce; }

/* ── UTILS ── */
.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-mark">N</div>
  <div class="logo-info">
    <div class="logo-name">NAGUMO</div>
    <div class="logo-sub">Agendamento</div>
  </div>

  <div class="cd-toggle-group">
    <button class="cd-btn" id="btn-cd1" onclick="switchCD('CD1')">CD1</button>
    <button class="cd-btn" id="btn-cd2" onclick="switchCD('CD2')">CD2</button>
  </div>

  <nav class="nav-pills">
    <button class="nav-pill active" id="nav-agenda" onclick="setView('agenda')">AGENDA</button>
    <button class="nav-pill" id="nav-dash" onclick="setView('dashboard')">DASHBOARD</button>
  </nav>

  <div class="topbar-right">
    <span id="topbar-date" style="font-size: 11px; color: rgba(255,255,255,0.4)"></span>
    <button onclick="logout()" style="background: none; border: none; color: white; font-size: 11px; font-weight: 700; cursor: pointer; opacity: 0.6">SAIR</button>
  </div>
</header>

<main>
  <!-- AGENDA VIEW -->
  <div class="view active" id="view-agenda">
    <section class="hero">
      <h1 class="hero-title">Gestão de <span id="hero-cd-label">CD1</span></h1>
      <p class="hero-sub">Painel de monitoramento de recebimento de fornecedores unidade <b id="sub-cd-label">CD1</b></p>
    </section>

    <div class="stat-bar" id="stat-bar">
      <!-- Injetado via JS -->
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="agenda-search" placeholder="Refine sua busca por razão social..." oninput="renderAll()">
      </div>
      <button class="btn-add" onclick="openModal()">NOVO REGISTRO</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Fornecedor</th>
            <th>Contrato</th>
            <th>Carga</th>
            <th>Vol. Previsto</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="agenda-table-body">
          <!-- Injetado via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div class="view" id="view-dashboard" style="padding: 32px">
    <h2 style="margin-bottom: 24px">Dashboard Analítico - <span id="dash-cd-label" class="text-cyan">CD1</span></h2>
    <div style="background: white; padding: 24px; border-radius: 24px; border: 1px solid var(--gray-border)">
      <canvas id="chart-contracts" height="120"></canvas>
    </div>
  </div>
</main>

<script>
// ── CONFIG & STATE ──
const TIPOS = {
  CL: { label: 'Contrato Logístico', cls: 'badge-cl' },
  SCL: { label: 'Sem Contrato', cls: 'badge-scl' },
  AP: { label: 'Acordo Pontual', cls: 'badge-ap' },
  CO: { label: 'Compra Oport.', cls: 'badge-co' }
};

let registries = JSON.parse(localStorage.getItem('nag_reg') || '[]');
let selectedCD = localStorage.getItem('nag_selected_cd') || 'CD1';
let currentView = 'agenda';

// ── CORE FUNCTIONS ──
function switchCD(cd) {
  selectedCD = cd;
  localStorage.setItem('nag_selected_cd', cd);
  updateUI();
  renderAll();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-pill').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + (v === 'agenda' ? 'agenda' : 'dash')).classList.add('active');
  if(v === 'dashboard') renderDashboard();
}

function updateUI() {
  document.getElementById('btn-cd1').classList.toggle('active', selectedCD === 'CD1');
  document.getElementById('btn-cd2').classList.toggle('active', selectedCD === 'CD2');
  
  const labels = ['hero-cd-label', 'sub-cd-label', 'dash-cd-label'];
  labels.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.textContent = selectedCD;
  });
}

function renderAll() {
  const q = document.getElementById('agenda-search').value.toLowerCase();
  
  // FILTRAGEM POR CD E BUSCA
  const filtered = registries.filter(r => {
    const matchesCD = (r.cd || 'CD1') === selectedCD;
    const matchesSearch = r.razaoSocial.toLowerCase().includes(q);
    return matchesCD && matchesSearch;
  });

  // RENDER TABLE
  const tbody = document.getElementById('agenda-table-body');
  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td style="font-weight: 700; color: #94a3b8">${r.data.split('-').reverse().slice(0,2).join('/')}</td>
      <td>
        <div style="font-weight: 800">${r.razaoSocial}</div>
        <div style="font-size: 10px; color: #94a3b8">${r.categoria}</div>
      </td>
      <td><span class="badge ${TIPOS[r.tipoContrato]?.cls || ''}">${TIPOS[r.tipoContrato]?.label || r.tipoContrato}</span></td>
      <td>${r.tipoCarga}</td>
      <td style="font-weight: 700">${r.volPrev || '—'}</td>
      <td>
        ${r.volConf ? '<span style="color: #16a34a; font-weight: 700">✓ Confirmado</span>' : '<span style="color: #94a3b8">Pendente</span>'}
      </td>
    </tr>
  `).join('');

  // RENDER STATS
  renderStats(filtered);
}

function renderStats(list) {
  const counts = { CL: 0, SCL: 0, AP: 0, CO: 0 };
  list.forEach(r => counts[r.tipoContrato]++);
  
  const stats = [
    { label: 'Fornecedores', val: list.length, color: 'var(--navy)' },
    { label: 'Contrato Log.', val: counts.CL, color: '#3b82f6' },
    { label: 'Sem Contrato', val: counts.SCL, color: '#f59e0b' },
    { label: 'Vol. Total', val: list.reduce((s,r) => s + (r.volPrev || 0), 0), color: 'var(--cyan)' }
  ];

  document.getElementById('stat-bar').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="color: ${s.color}">${s.val}</div>
    </div>
  `).join('');
}

let chartInstance = null;
function renderDashboard() {
  const ctx = document.getElementById('chart-contracts').getContext('2d');
  const filtered = registries.filter(r => (r.cd || 'CD1') === selectedCD);
  const data = Object.keys(TIPOS).map(k => filtered.filter(r => r.tipoContrato === k).length);

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.values(TIPOS).map(t => t.label),
      datasets: [{
        label: 'Fornecedores por Tipo',
        data: data,
        backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6'],
        borderRadius: 8
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

function logout() {
  sessionStorage.removeItem('nagumo_auth');
  window.location.href = 'login.html';
}

// ── BOOT ──
(function boot() {
  const auth = sessionStorage.getItem('nagumo_auth');
  if(!auth) window.location.href = 'login.html';
  
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
  updateUI();
  renderAll();
})();
</script>
</body>
</html>
