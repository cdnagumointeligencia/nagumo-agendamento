<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#031F3E; --navy2:#052a54; --teal:#3AC4D4; --red:#CD0036; --red-dk:#a8002b;
  --snow:#F7F7F7; --white:#ffffff; --font:'Plus Jakarta Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font); min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background-color:var(--navy);
  background-image: radial-gradient(circle at 20% 10%, rgba(58,196,212,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 90%, rgba(205,0,54,0.1) 0%, transparent 50%);
}
.card{
  background:var(--white); border-radius:32px; width:100%; max-width:420px; overflow:hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes fadeUp{ from{opacity:0; transform:translateY(30px)} to{opacity:1; transform:translateY(0)} }

.card-head{
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 48px 40px 32px; text-align:center; position:relative;
}
.card-head::after{ content:''; position:absolute; bottom:0; left:0; right:0; height:4px; background: linear-gradient(90deg, var(--teal), var(--red)); }

.logo-mark{
    width:64px; height:64px; background:linear-gradient(135deg, var(--red), var(--red-dk));
    border-radius:18px; display:inline-flex; align-items:center; justify-content:center;
    font-weight:900; font-size:28px; color:white; margin-bottom:20px;
    box-shadow: 0 8px 24px rgba(205,0,54,0.4);
}
.card-title{ color:white; font-size:22px; font-weight:800; letter-spacing:-0.5px; }

.body{ padding:40px; }
.field{ margin-bottom:20px; }
.field label{ display:block; font-size:11px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.field input{
  width:100%; padding:14px 18px; border:2px solid #f1f5f9; border-radius:16px;
  font-family:inherit; font-size:15px; background:var(--snow); outline:none; transition:all 0.2s;
}
.field input:focus{ border-color:var(--teal); background:white; box-shadow: 0 0 0 5px rgba(58,196,212,0.1); }

.btn{
  width:100%; padding:16px; border:none; border-radius:18px;
  background: linear-gradient(135deg, var(--red), var(--red-dk));
  color:white; font-weight:800; font-size:15px; cursor:pointer;
  box-shadow: 0 10px 25px rgba(205,0,54,0.3); transition:all 0.2s;
}
.btn:hover{ transform:translateY(-2px); box-shadow: 0 15px 35px rgba(205,0,54,0.4); }

.alert{
    padding:14px; border-radius:14px; font-size:13px; font-weight:700; margin-bottom:20px; display:none;
}
.alert.err{ background:#fef2f2; color:#b91c1c; border:1px solid #fee2e2; }
</style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <div class="logo-mark">N</div>
    <div class="card-title">Agendamento Nagumo</div>
  </div>

  <div class="body">
    <div id="alert" class="alert err">E-mail ou senha incorretos.</div>
    
    <div class="field">
      <label>E-mail Corporativo</label>
      <input type="email" id="email" placeholder="seu@nagumo.com.br">
    </div>
    
    <div class="field">
      <label>Senha de Acesso</label>
      <input type="password" id="pass" placeholder="••••••••">
    </div>

    <button class="btn" onclick="doLogin()">ACESSAR SISTEMA</button>
  </div>
</div>

<script>
function doLogin() {
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('pass').value;
  const al = document.getElementById('alert');

  if(e === 'admin@nagumo.com.br' && p === 'Admin@2025') {
    sessionStorage.setItem('nagumo_auth', JSON.stringify({
       ok: true,
       nome: 'Administrador',
       role: 'admin',
       cd: ['CD1', 'CD2']
    }));
    window.location.href = 'index.html';
  } else {
    al.style.display = 'block';
    al.textContent = 'Acesso não autorizado.';
  }
}

// Enter para logar
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>

</body>
</html>
