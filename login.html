<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo · Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

<!-- Firebase Compat SDK — mesma versão do index.html -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;flex-direction:column}

.topbar{background:#0d1b2e;height:52px;display:flex;align-items:center;padding:0 24px;gap:10px}
.logo{width:28px;height:28px;background:#e8192c;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.brand{font-size:14px;font-weight:700;color:#fff;letter-spacing:.4px}
.brand small{display:block;font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1.2px;text-transform:uppercase;font-weight:400}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}

.card{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;max-width:360px;overflow:hidden}

.card-top{background:linear-gradient(135deg,#0d1b2e,#162338);padding:24px 24px 20px}
.card-top h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.card-top p{font-size:12px;color:rgba(255,255,255,.45)}

.tabs{display:flex;border-bottom:1px solid #e2e5ea}
.tab{flex:1;padding:12px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:#e8192c;border-bottom-color:#e8192c}

.body{padding:20px 24px 24px}
.panel{display:none}
.panel.active{display:block}

.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.field input{width:100%;padding:10px 11px;border:1.5px solid #e2e5ea;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:#0d1b2e;outline:none;transition:border-color .15s}
.field input:focus{border-color:#e8192c}
.field input::placeholder{color:#c0c4cc}

.alert{display:none;align-items:center;gap:7px;padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:12px}
.alert.show{display:flex}
.alert.ok{background:#e0f7f5;color:#0f766e;border:1px solid #99e6de}
.alert.err{background:#fff0f1;color:#c0101f;border:1px solid #fca5a5}

.btn{width:100%;padding:11px;border:none;border-radius:8px;background:#e8192c;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;transition:.15s}
.btn:hover{background:#c0101f}
.btn:disabled{background:#d1d5db;cursor:not-allowed}

.note{font-size:11px;color:#9ca3af;text-align:center;margin-top:14px}
.note a{color:#e8192c;text-decoration:none;font-weight:600}

.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">N</div>
  <div class="brand">NAGUMO <small>Agendamento de Fornecedores</small></div>
</div>

<div class="page">
  <div class="card">

    <div class="card-top">
      <h1>Acesso ao sistema</h1>
      <p>Use suas credenciais Nagumo</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="go('login',this)">Entrar</button>
      <button class="tab" onclick="go('cadastro',this)">Cadastrar</button>
    </div>

    <div class="body">

      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <div class="alert" id="al-l"></div>
        <div class="field"><label>E-mail</label><input type="email" id="l-email" placeholder="seu@nagumo.com.br"></div>
        <div class="field"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••"></div>
        <button class="btn" id="btn-l" onclick="doLogin()">
          <div class="spin" id="sl"></div><span id="tl">Entrar</span>
        </button>
        <p class="note">Esqueceu a senha? Fale com o administrador.</p>
      </div>

      <!-- CADASTRO -->
      <div class="panel" id="panel-cadastro">
        <div class="alert" id="al-c"></div>
        <div class="field"><label>Nome completo</label><input type="text" id="c-nome" placeholder="João Silva"></div>
        <div class="field"><label>E-mail</label><input type="email" id="c-email" placeholder="seu@nagumo.com.br"></div>
        <div class="field"><label>Senha</label><input type="password" id="c-senha" placeholder="Mínimo 6 caracteres"></div>
        <button class="btn" id="btn-c" onclick="doCad()">
          <div class="spin" id="sc"></div><span id="tc">Cadastrar</span>
        </button>
        <p class="note">Já tem conta? <a href="#" onclick="go('login');return false">Entrar</a></p>
      </div>

    </div>
  </div>
</div>

<script>
// ── FIREBASE ─────────────────────────────────────────────────
// Mesma config E mesma coleção ("nagumo_agenda") do index.html.
// Isso garante que as regras do Firestore já permitem acesso —
// não é necessário nenhuma mudança nas regras de segurança.
const firebaseConfig = {
  apiKey:            "AIzaSyCkUu4CRWEs4HuaYXMKAHQaMQPeQ6BHiKQ",
  authDomain:        "nagumo-agendamento.firebaseapp.com",
  projectId:         "nagumo-agendamento",
  storageBucket:     "nagumo-agendamento.firebasestorage.app",
  messagingSenderId: "577346122276",
  appId:             "1:577346122276:web:e00efca664c8d438119eb1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Mesma coleção do index.html → regras já existentes cobrem este acesso
const COL     = 'nagumo_agenda';   // igual ao _COL do index.html
const DOC_KEY = 'nag_login_users'; // novo documento dentro da coleção existente

// ── USUÁRIOS FIXOS (sem Firebase, funcionam offline) ─────────
const FIXOS = [
  {email:'admin@nagumo.com.br',  senha:'Admin@2025',  nome:'Administrador', role:'admin'},
  {email:'usuario@nagumo.com.br',senha:'Nagumo@2025', nome:'Usuário',       role:'usuario'},
];

// ── LEITURA E ESCRITA — padrão idêntico ao index.html ────────
async function getUsers() {
  try {
    const snap = await db.collection(COL).doc(DOC_KEY).get();
    if (!snap.exists) return [];
    return Array.isArray(snap.data().payload) ? snap.data().payload : [];
  } catch (e) {
    return [];
  }
}

async function saveUsers(users) {
  await db.collection(COL).doc(DOC_KEY).set({ payload: users });
}

// ── UI ───────────────────────────────────────────────────────
function go(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll('.tab')[id === 'login' ? 0 : 1].classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('al-l').className = 'alert';
  document.getElementById('al-c').className = 'alert';
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'alert show ' + type;
  el.textContent = msg;
}

function setLoading(spinId, textId, btnId, on) {
  document.getElementById(spinId).style.display = on ? 'block' : 'none';
  document.getElementById(textId).style.display = on ? 'none'  : 'inline';
  document.getElementById(btnId).disabled = on;
}

// ── LOGIN ────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const senha = document.getElementById('l-senha').value;

  if (!email || !senha) {
    showAlert('al-l', 'err', 'Preencha e-mail e senha.');
    return;
  }

  setLoading('sl', 'tl', 'btn-l', true);

  try {
    // 1. Usuários fixos — verificação local, sem internet
    const fixo = FIXOS.find(u => u.email === email && u.senha === senha);
    if (fixo) { loginOk(fixo.nome, fixo.role); return; }

    // 2. Usuários cadastrados — Firestore (disponível em qualquer navegador)
    const users = await getUsers();
    const found = users.find(u => u.email === email && u.senha === senha);
    if (found) { loginOk(found.nome, found.role || 'usuario'); return; }

    showAlert('al-l', 'err', 'E-mail ou senha incorretos.');

  } catch (err) {
    console.error(err);
    showAlert('al-l', 'err', 'Erro de conexão com o servidor. Verifique sua internet.');
  } finally {
    setLoading('sl', 'tl', 'btn-l', false);
  }
}

function loginOk(nome, role) {
  showAlert('al-l', 'ok', 'Login realizado! Redirecionando…');
  sessionStorage.setItem('nagumo_auth', JSON.stringify({ ok: true, role, nome }));
  setTimeout(() => { window.location.href = 'index.html'; }, 900);
}

// ── CADASTRO ─────────────────────────────────────────────────
async function doCad() {
  const nome  = document.getElementById('c-nome').value.trim();
  const email = document.getElementById('c-email').value.trim().toLowerCase();
  const senha = document.getElementById('c-senha').value;

  if (!nome || !email || !senha) {
    showAlert('al-c', 'err', 'Preencha todos os campos.');
    return;
  }
  if (senha.length < 6) {
    showAlert('al-c', 'err', 'Senha com mínimo 6 caracteres.');
    return;
  }
  if (FIXOS.find(u => u.email === email)) {
    showAlert('al-c', 'err', 'Este e-mail já está cadastrado.');
    return;
  }

  setLoading('sc', 'tc', 'btn-c', true);

  try {
    const users = await getUsers();

    if (users.find(u => u.email === email)) {
      showAlert('al-c', 'err', 'Este e-mail já está cadastrado.');
      return;
    }

    users.push({ nome, email, senha, role: 'usuario' });
    await saveUsers(users);

    showAlert('al-c', 'ok', 'Cadastro realizado! Já pode fazer login.');
    document.getElementById('c-nome').value  = '';
    document.getElementById('c-email').value = '';
    document.getElementById('c-senha').value = '';
    setTimeout(() => go('login'), 1500);

  } catch (err) {
    console.error(err);
    showAlert('al-c', 'err', 'Erro de conexão com o servidor. Verifique sua internet.');
  } finally {
    setLoading('sc', 'tc', 'btn-c', false);
  }
}

// ── ENTER ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else doCad();
});
</script>
</body>
</html>
