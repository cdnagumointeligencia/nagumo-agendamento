<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo · Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#031F3E; --teal:#3AC4D4; --teal-dk:#28a8b5; --teal-lt:#e8f9fb;
  --red:#CD0036; --red-dk:#a8002b; --red-lt:#fff0f3;
  --snow:#F7F7F7; --white:#ffffff; --mid:#e2e8f0; --muted:#64748b; --label:#334155;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px 16px;
  background-color:var(--navy);
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(58,196,212,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%,rgba(205,0,54,.08) 0%,transparent 55%),
    repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.013) 40px,rgba(255,255,255,.013) 41px);
}
.card{background:var(--white);border-radius:20px;width:100%;max-width:400px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(58,196,212,.18),0 24px 64px rgba(3,31,62,.55),0 8px 24px rgba(0,0,0,.25);
  animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.card-head{background:linear-gradient(145deg,#031F3E 0%,#052a54 55%,#073265 100%);
  padding:32px 28px 26px;text-align:center;position:relative;overflow:hidden;}
.card-head::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(58,196,212,.18) 0%,transparent 70%);pointer-events:none;}
.card-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--teal) 0%,var(--red) 100%);}
.logo-mark{width:52px;height:52px;background:linear-gradient(135deg,var(--red) 0%,#a8002b 100%);
  border-radius:14px;display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;font-size:22px;color:var(--white);margin-bottom:14px;
  box-shadow:0 4px 16px rgba(205,0,54,.45);letter-spacing:-1px;}
.card-title{font-size:20px;font-weight:700;color:var(--white);margin-bottom:4px;letter-spacing:-.3px;}
.card-sub{font-size:11.5px;color:rgba(255,255,255,.45);letter-spacing:.4px;}
.card-sub span{color:var(--teal);font-weight:600;}
.tabs{display:flex;background:var(--snow);border-bottom:2px solid var(--mid);}
.tab{flex:1;padding:13px 12px;background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;}
.tab.active{color:var(--red);border-bottom-color:var(--red);background:var(--white);}
.tab:not(.active):hover{color:var(--navy);}
.body{padding:24px 28px 28px;}
.panel{display:none;}.panel.active{display:block;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--label);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--mid);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--navy);background:var(--snow);
  outline:none;transition:border-color .18s,background .18s,box-shadow .18s;}
.field input:focus{border-color:var(--teal);background:var(--white);box-shadow:0 0 0 3px rgba(58,196,212,.14);}
.field input::placeholder{color:#94a3b8;}
.pass-wrap{position:relative;display:flex;align-items:center;}
.pass-wrap input{padding-right:42px;}
.eye-btn{position:absolute;right:12px;cursor:pointer;color:#94a3b8;display:flex;align-items:center;user-select:none;transition:color .18s;}
.eye-btn:hover{color:var(--teal);}
.alert{display:none;align-items:center;gap:8px;padding:10px 13px;border-radius:10px;
  font-size:12.5px;font-weight:500;margin-bottom:14px;line-height:1.4;}
.alert.show{display:flex;}
.alert.ok{background:var(--teal-lt);color:#0e6e78;border:1px solid rgba(58,196,212,.35);}
.alert.err{background:var(--red-lt);color:#9b0028;border:1px solid rgba(205,0,54,.25);}
.btn{width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--red) 0%,var(--red-dk) 100%);
  color:var(--white);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:6px;
  letter-spacing:.2px;box-shadow:0 4px 14px rgba(205,0,54,.35);transition:transform .15s,box-shadow .15s,opacity .15s;}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(205,0,54,.45);}
.btn:disabled{opacity:.55;cursor:not-allowed;}
.note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:16px;}
.note a{color:var(--teal-dk);text-decoration:none;font-weight:600;cursor:pointer;}
.note a:hover{text-decoration:underline;}
.spin{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.3);border-top-color:var(--white);
  border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.ov{position:fixed;inset:0;background:rgba(3,31,62,.65);display:flex;align-items:center;
  justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.ov.hidden{display:none;}
.ov-box{background:var(--white);border-radius:14px;padding:26px 36px;display:flex;
  flex-direction:column;align-items:center;gap:12px;font-size:13px;font-weight:600;
  color:var(--navy);box-shadow:0 16px 48px rgba(3,31,62,.4);}
.ov-spin{width:26px;height:26px;border:3px solid var(--mid);border-top-color:var(--teal);
  border-radius:50%;animation:spin .7s linear infinite;}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0 14px;color:#cbd5e1;font-size:11px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--mid);}
</style>
</head>
<body>

<div class="ov" id="ov">
  <div class="ov-box"><div class="ov-spin"></div>Verificando acesso…</div>
</div>

<div class="card">
  <div class="card-head">
    <div class="logo-mark">N</div>
    <div class="card-title">Agendamento de Fornecedores</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login"    onclick="go('login',this)">Entrar</button>
    <button class="tab"        id="tab-cadastro" onclick="go('cadastro',this)">Novo acesso</button>
  </div>

  <div class="body">
    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="alert" id="al-l"></div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="l-email" placeholder="seu@nagumo.com.br" autocomplete="off">
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="pass-wrap">
          <input type="password" id="l-senha" placeholder="••••••••">
          <span class="eye-btn" onclick="toggleEye('l-senha',this)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">
        <div class="spin" id="sl"></div><span id="tl">Entrar</span>
      </button>
      <p class="note">Esqueceu a senha? Fale com o administrador.</p>
    </div>

    <!-- CADASTRO -->
    <div class="panel" id="panel-cadastro">
      <div class="alert" id="al-c"></div>
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="c-nome" placeholder="João Silva">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="c-email" placeholder="seu@nagumo.com.br" autocomplete="off">
      </div>
      <div class="divider">senha de acesso</div>
      <div class="field">
        <label>Senha</label>
        <div class="pass-wrap">
          <input type="password" id="c-senha" placeholder="Mínimo 6 caracteres">
          <span class="eye-btn" onclick="toggleEye('c-senha',this)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
      </div>
      <div class="field">
        <label>Confirmar senha</label>
        <div class="pass-wrap">
          <input type="password" id="c-senha2" placeholder="Repita a senha">
          <span class="eye-btn" onclick="toggleEye('c-senha2',this)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
      </div>
      <div class="field">
        <label>🛡️ Código de autorização</label>
        <div class="pass-wrap">
          <input type="password" id="c-auth" placeholder="Fornecido pelo administrador" autocomplete="off">
          <span class="eye-btn" onclick="toggleEye('c-auth',this)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
      </div>
      <button class="btn" id="btn-cad" onclick="doCad()">
        <div class="spin" id="sc"></div><span id="tc">Solicitar acesso</span>
      </button>
      <p class="note">Já tem conta? <a onclick="go('login')">Entrar</a></p>
    </div>

  </div>
</div>

<script>
const _fbConfig = {
  apiKey:"AIzaSyCkUu4CRWEs4HuaYXMKAHQaMQPeQ6BHiKQ",
  authDomain:"nagumo-agendamento.firebaseapp.com",
  projectId:"nagumo-agendamento",
  storageBucket:"nagumo-agendamento.firebasestorage.app",
  messagingSenderId:"577346122276",
  appId:"1:577346122276:web:e00efca664c8d438119eb1"
};
firebase.initializeApp(_fbConfig);
const _db  = firebase.firestore();
const _COL = "nagumo_agenda";
const _DOC = "nag_auth";

/* admin padrão: acesso a ambos os CDs */
const ADMIN = { nome:"Administrador", email:"admin@nagumo.com.br", senha:"Admin@2025", role:"admin", cd:["CD1","CD2"] };
const CODE_DEFAULT = "NAGUMO2025";

async function getAuthData() {
  try {
    const snap = await _db.collection(_COL).doc(_DOC).get();
    if (snap.exists) return snap.data();
  } catch(e) { console.warn('[Auth]', e.message); }
  return null;
}
async function saveAuthData(data) {
  try { await _db.collection(_COL).doc(_DOC).set(data); return true; }
  catch(e) { console.warn('[Auth] escrita:', e.message); return false; }
}

/* BOOT: só verifica sessão, não escreve */
(function boot() {
  try {
    const s = sessionStorage.getItem('nagumo_auth');
    if (s) { const p = JSON.parse(s); if (p && p.ok) { window.location.href='index.html'; return; } }
  } catch(_) {}
  document.getElementById('ov').classList.add('hidden');
})();

function toggleEye(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.style.color = show ? '#3AC4D4' : '#94a3b8';
}
function go(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  (el || document.getElementById('tab-'+id)).classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.alert').forEach(a => { a.className='alert'; a.textContent=''; });
}
function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'alert show '+type;
  el.textContent = msg;
}
function setLoading(s,t,b,on) {
  document.getElementById(s).style.display = on?'block':'none';
  document.getElementById(t).style.display = on?'none':'inline';
  document.getElementById(b).disabled = on;
}
function setSession(user) {
  sessionStorage.setItem('nagumo_auth', JSON.stringify({
    ok:true, role:user.role, nome:user.nome,
    /* cd: array de CDs acessíveis. Admin sempre tem ambos. Usuário novo recebe [] até admin configurar. */
    cd: user.cd || (user.role==='admin' ? ['CD1','CD2'] : [])
  }));
}

/* ── LOGIN ── */
async function doLogin() {
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const senha = document.getElementById('l-senha').value;
  if (!email || !senha) { showAlert('al-l','err','Preencha e-mail e senha.'); return; }

  setLoading('sl','tl','btn-login',true);
  try {
    let data = await getAuthData();
    if (!data) {
      const init = { authCode:CODE_DEFAULT, users:{ [ADMIN.email]:{...ADMIN} } };
      const ok = await saveAuthData(init);
      if (ok) { data = init; }
      else {
        if (email===ADMIN.email && senha===ADMIN.senha) {
          showAlert('al-l','ok','Login realizado! Redirecionando…');
          setSession(ADMIN);
          setTimeout(()=>{ window.location.href='index.html'; }, 900);
          return;
        }
        showAlert('al-l','err','Erro de permissão. Verifique as regras do Firestore.'); return;
      }
    }
    const user = (data.users||{})[email];
    if (!user)                { showAlert('al-l','err','E-mail não encontrado.'); return; }
    if (user.senha !== senha) { showAlert('al-l','err','Senha incorreta.'); return; }

    showAlert('al-l','ok','Login realizado! Redirecionando…');
    setSession(user);
    setTimeout(()=>{ window.location.href='index.html'; }, 900);
  } catch(e) {
    showAlert('al-l','err','Erro de conexão. Verifique sua internet.');
  } finally {
    setLoading('sl','tl','btn-login',false);
  }
}

/* ── CADASTRO ── */
async function doCad() {
  const nome   = document.getElementById('c-nome').value.trim();
  const email  = document.getElementById('c-email').value.trim().toLowerCase();
  const senha  = document.getElementById('c-senha').value;
  const senha2 = document.getElementById('c-senha2').value;
  const auth   = document.getElementById('c-auth').value;
  if (!nome||!email||!senha||!senha2||!auth) { showAlert('al-c','err','Preencha todos os campos.'); return; }
  if (senha !== senha2) { showAlert('al-c','err','As senhas não coincidem.'); return; }
  if (senha.length < 6) { showAlert('al-c','err','Senha com mínimo 6 caracteres.'); return; }

  setLoading('sc','tc','btn-cad',true);
  try {
    let data = await getAuthData();
    if (!data) data = { authCode:CODE_DEFAULT, users:{ [ADMIN.email]:{...ADMIN} } };
    if (auth !== (data.authCode||CODE_DEFAULT)) { showAlert('al-c','err','Código de autorização inválido.'); return; }
    if (data.users && data.users[email]) { showAlert('al-c','err','Este e-mail já está cadastrado.'); return; }
    data.users = data.users || {};
    /* Novo usuário começa sem CD — admin define depois em admin-usuarios.html */
    data.users[email] = { nome, email, senha, role:'usuario', cd:[] };
    const ok = await saveAuthData(data);
    if (!ok) { showAlert('al-c','err','Sem permissão para salvar. Verifique as regras do Firestore.'); return; }
    showAlert('al-c','ok','Cadastro realizado! O administrador irá liberar seu acesso ao CD.');
    ['c-nome','c-email','c-senha','c-senha2','c-auth'].forEach(id=>{ document.getElementById(id).value=''; });
    setTimeout(()=>go('login'), 2000);
  } catch(e) {
    showAlert('al-c','err','Erro de conexão. Verifique sua internet.');
  } finally {
    setLoading('sc','tc','btn-cad',false);
  }
}

document.addEventListener('keydown', e=>{
  if (e.key!=='Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else doCad();
});
</script>
</body>
</html>
