<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagumo · Gerenciar Usuários</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#031F3E; --navy2:#052a54; --teal:#3AC4D4; --red:#CD0036; --red-dk:#a8002b;
  --snow:#F7F7F7; --white:#ffffff; --gray-border: #E4E8EF; --font:'Plus Jakarta Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{ font-family:var(--font); background:var(--snow); min-height:100vh; color:var(--navy); }

/* ── TOPBAR ── */
.topbar{
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  height: 64px; display: flex; align-items: center; padding: 0 24px; gap: 14px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(3,31,62,0.3);
}
.tb-logo{ width:34px; height:34px; background:linear-gradient(135deg, var(--red), var(--red-dk)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; color:white; }
.tb-brand{ font-size:14px; font-weight:800; color:white; }
.tb-brand small{ display:block; font-size:9px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; }

.tb-right{ margin-left:auto; display:flex; align-items:center; gap:12px; }
.btn-back{ 
    color:rgba(255,255,255,0.6); text-decoration:none; font-size:11px; font-weight:800;
    padding:8px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); transition:all 0.2s;
}
.btn-back:hover{ background:rgba(255,255,255,0.1); color:white; }

/* ── CONTENT ── */
.content{ max-width:1000px; margin:0 auto; padding:40px 24px; }
.page-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; }
.page-title{ font-size:24px; font-weight:800; letter-spacing:-0.5px; }

/* ── CARD TABLE ── */
.card-table{ background:white; border-radius:24px; border:1px solid var(--gray-border); box-shadow: 0 8px 30px rgba(3,31,62,0.05); overflow:hidden; }
table{ width:100%; border-collapse:collapse; }
thead th{ text-align:left; padding:16px 24px; font-size:10px; font-weight:800; color:#94a3b8; text-transform:uppercase; background:#f8fafc; border-bottom:1px solid var(--gray-border); }
td{ padding:16px 24px; border-bottom:1px solid #f1f5f9; font-size:13px; }

.user-badge{ width:36px; height:36px; border-radius:12px; background:var(--navy); color:white; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; }
.user-info{ display:flex; align-items:center; gap:12px; }
.user-name{ font-weight:800; }
.user-email{ font-size:11px; color:#94a3b8; }

.pill-cd{ padding:4px 10px; border-radius:8px; font-size:10px; font-weight:800; background:var(--snow); border:1.5px solid var(--gray-border); color:#64748b; cursor:pointer; }
.pill-cd.active{ background:var(--teal); border-color:var(--teal); color:var(--navy); }

.btn-del{ width:32px; height:32px; border-radius:8px; border:none; background:#fef2f2; color:var(--red); cursor:pointer; font-weight:800; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.btn-del:hover{ background:var(--red); color:white; }
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-logo">N</div>
  <div class="tb-brand">NAGUMO <small>Usuários</small></div>
  <div class="tb-right">
    <a href="index.html" class="btn-back">VOLTAR AO SISTEMA</a>
  </div>
</header>

<div class="content">
  <div class="page-head">
    <h1 class="page-title">Permissões de Acesso</h1>
    <button style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:800; font-size:12px; cursor:pointer;">NOVO USUÁRIO</button>
  </div>

  <div class="card-table">
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Acesso Unidade</th>
          <th style="text-align:center">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <!-- Render via JS -->
      </tbody>
    </table>
  </div>
</div>

<script>
// Mock data para exemplo
const users = [
  { nome: 'Marcos Almeida', email: 'marcos@nagumo.com.br', role: 'admin', cd: ['CD1', 'CD2'] },
  { nome: 'João Silva', email: 'joao@nagumo.com.br', role: 'usuario', cd: ['CD1'] },
  { nome: 'Ana Souza', email: 'ana@nagumo.com.br', role: 'usuario', cd: ['CD2'] }
];

function render() {
  const tb = document.getElementById('tbody');
  tb.innerHTML = users.map(u => `
    <tr>
      <td>
        <div class="user-info">
          <div class="user-badge">${u.nome.split(' ').map(n=>n[0]).join('').toUpperCase()}</div>
          <div>
            <div class="user-name">${u.nome}</div>
            <div class="user-email">${u.email}</div>
          </div>
        </div>
      </td>
      <td>
        <span style="font-weight:700; color:${u.role==='admin'?'var(--red)':'#94a3b8'}">${u.role.toUpperCase()}</span>
      </td>
      <td>
        <div style="display:flex; gap:6px">
          <span class="pill-cd ${u.cd.includes('CD1')?'active':''}">CD1</span>
          <span class="pill-cd ${u.cd.includes('CD2')?'active':''}">CD2</span>
        </div>
      </td>
      <td align="center">
        <button class="btn-del">×</button>
      </td>
    </tr>
  `).join('');
}

render();
</script>

</body>
</html>
